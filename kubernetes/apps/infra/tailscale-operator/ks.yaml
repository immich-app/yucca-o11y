---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tailscale-operator
  namespace: flux-system
spec:
  targetNamespace: operators
  interval: 1h
  path: ./kubernetes/apps/infra/tailscale-operator/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
