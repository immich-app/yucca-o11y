---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: victoria-metrics-operator-crds
  namespace: flux-system
spec:
  targetNamespace: operators
  interval: 1h
  path: ./kubernetes/apps/infra/victoria-metrics-operator-crds/app
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
