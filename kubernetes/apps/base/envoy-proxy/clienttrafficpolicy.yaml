apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: envoy
spec:
  # clientIPDetection:
  #   xForwardedFor:
  #     trustedCIDRs:
  #       - 10.42.0.0/16
  http2:
    onInvalidMessage: TerminateStream
  # No HTTP/3: the OVH Octavia LB is L4 TCP, so QUIC/UDP can't traverse it. Keeping
  # it off also leaves the Envoy Service with a single TCP port to pin a NodePort on.
  targetSelectors:
    - group: gateway.networking.k8s.io
      kind: Gateway
  tcpKeepalive: {}
  tls:
    minVersion: "1.2"
    alpnProtocols:
      - h2
      - http/1.1
