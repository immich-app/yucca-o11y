---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/clustersecretstore_v1.json
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: onepassword
spec:
  provider:
    onepassword:
      connectHost: http://onepassword-connect.external-secrets.svc.cluster.local:8080
      vaults:
        o11y_tf: 1
      auth:
        secretRef:
          connectTokenSecretRef:
            name: onepassword-connect
            namespace: external-secrets
            key: token
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/clustersecretstore_v1.json
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: onepassword-environment
spec:
  provider:
    onepassword:
      connectHost: http://onepassword-connect.external-secrets.svc.cluster.local:8080
      # Per-env vault name from cluster-settings. Flux postBuild substitutes it (drone
      # envsubst runs on the YAML text, so it resolves this map key). Note: `flate` does
      # not render key substitution, so it shows ${OP_VAULT} literally — real Flux
      # resolves it (e.g. o11y_tf_staging / o11y_tf_prod).
      vaults:
        ${OP_VAULT}: 1
      auth:
        secretRef:
          connectTokenSecretRef:
            name: onepassword-connect-environment
            namespace: external-secrets
            key: token
