---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: grafana-postgres
  labels:
    app.kubernetes.io/name: grafana-postgres
spec:
  # Default; the per-env overlay patches this with a renovate-managed pin.
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4@sha256:8ff3abd13383e619797f974b4fcdda6de0c2cfdad90eb47e1cd95d41fe26bf80
  instances: 3
  primaryUpdateStrategy: unsupervised

  storage:
    size: 20Gi
    storageClass: openebs-spare-disk

  # One instance per worker (3 workers, 3 instances).
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required

  enableSuperuserAccess: true
  superuserSecret:
    name: grafana-postgres-superuser-password

  # Create the grafana database + owner role from the grafana-postgres-password secret.
  bootstrap:
    initdb:
      database: grafana
      owner: grafana
      secret:
        name: grafana-postgres-password

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: 256MB

  # PodMonitor is converted to a VMPodScrape by the VM operator and scraped.
  monitoring:
    enablePodMonitor: true
