---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: futostat-us
spec:
  dnsNames: []
  duration: 160h
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-production
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  secretName: futostat-us-tls
  usages:
    - digital signature
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: futostatus-com
spec:
  dnsNames: []
  duration: 160h
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-production
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  secretName: futostatus-com-tls
  usages:
    - digital signature
