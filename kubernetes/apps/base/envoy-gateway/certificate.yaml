---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cert-manager.io/certificate_v1.json
# Short-lived ECDSA certs (~6.6 day duration; cert-manager renews ahead of expiry
# on its default schedule). dnsNames use ${APP_DOMAIN}/${ALT_DOMAIN}, substituted per-env.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: futostat-us
spec:
  dnsNames:
    - "*.${APP_DOMAIN}"
    - "${APP_DOMAIN}"
  duration: 160h
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  usages:
    - digital signature
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-production
  secretName: futostat-us-tls
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: futostatus-com
spec:
  dnsNames:
    - "*.${ALT_DOMAIN}"
    - "${ALT_DOMAIN}"
  duration: 160h
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  usages:
    - digital signature
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-production
  secretName: futostatus-com-tls
