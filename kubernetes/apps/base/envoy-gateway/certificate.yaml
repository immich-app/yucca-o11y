---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: staging-futostat-us
spec:
  dnsNames:
    - staging.futostat.us
    - "*.staging.futostat.us"
  duration: 160h
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  secretName: staging-futostat-us-tls
  usages:
    - digital signature
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: staging-futostatus-com
spec:
  dnsNames:
    - staging.futostatus.com
    - "*.staging.futostatus.com"
  duration: 160h
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  secretName: staging-futostatus-com-tls
  usages:
    - digital signature
