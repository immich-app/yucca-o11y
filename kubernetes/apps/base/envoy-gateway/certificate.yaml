---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: futostatus-com
spec:
  dnsNames:
    - "*.${APP_DOMAIN}"
    - "${APP_DOMAIN}"
  duration: 160h
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  usages:
    - digital signature
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-production
  secretName: futostatus-com-tls
