---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
spec:
  chartRef:
    kind: OCIRepository
    name: metallb
  interval: 1h
  install:
    crds: CreateReplace
  rollback:
    cleanupOnFail: true
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    strategy:
      name: RemediateOnFailure
    remediation:
      remediateLastFailure: true
      retries: 2
  values:
    # L2-mode only; we have no BGP peers. Disable FRR-K8s and the speaker's
    # per-pod FRR sidecar so the chart deploys just the ARP announcer.
    frrk8s:
      enabled: false
    speaker:
      frr:
        enabled: false
