---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-metrics
  interval: 1h
  rollback:
    cleanupOnFail: true
  upgrade:
    cleanupOnFail: true
    strategy:
      name: RemediateOnFailure
    remediation:
      remediateLastFailure: true
      retries: 2
  values:
    fullnameOverride: victoria-metrics

    global:
      clusterLabel: cluster

    victoria-metrics-operator:
      env:
        - name: VM_GATEWAY_API_ENABLED
          value: "true"

    vmcluster:
      enabled: true
      spec:
        retentionPeriod: ${CLUSTER_VMETRICS_RETENTION}
        replicationFactor: 2
        vmstorage:
          replicaCount: 3
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: vmstorage
          storage:
            volumeClaimTemplate:
              spec:
                storageClassName: openebs-spare-disk
                resources:
                  requests:
                    storage: 100Gi
        vmselect:
          replicaCount: 2
          extraArgs:
            # RF=2 requires vmselect dedup set to the scrape interval — matches the
            # chart's default scrapeInterval (20s).
            dedup.minScrapeInterval: 20s
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: ScheduleAnyway
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: vmselect
          storage:
            volumeClaimTemplate:
              spec:
                storageClassName: openebs-system-disk
                resources:
                  requests:
                    storage: 5Gi
        vminsert:
          replicaCount: 2
          extraArgs:
            replicationFactor: "2"
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: ScheduleAnyway
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: vminsert

    vmsingle:
      enabled: false

    vmagent:
      spec:
        externalLabels:
          cluster: ${CLUSTER_NAME}
        statefulMode: true
        statefulStorage:
          volumeClaimTemplate:
            spec:
              storageClassName: openebs-system-disk
              resources:
                requests:
                  storage: 10Gi
        remoteWrite:
          - url: http://vminsert-victoria-metrics.o11y.svc.cluster.local:8480/insert/0/prometheus/api/v1/write
        extraArgs:
          promscrape.streamParse: "true"
          promscrape.dropOriginalLabels: "true"
          promscrape.maxScrapeSize: 50MiB

    vmalert:
      enabled: true
      spec:
        externalLabels:
          cluster: ${CLUSTER_NAME}
        # Alertmanager is stubbed off for now, so vmalert has no notifier. Blackhole
        # notifications — rules still evaluate (state visible in the vmalert UI /
        # recording rules still written) — until a real Alertmanager + receiver lands.
        extraArgs:
          notifier.blackhole: "true"
        remoteWrite:
          url: http://vminsert-victoria-metrics.o11y.svc.cluster.local:8480/insert/0/prometheus/api/v1/write
        remoteRead:
          url: http://vmselect-victoria-metrics.o11y.svc.cluster.local:8481/select/0/prometheus/

    alertmanager:
      enabled: false

    vmauth:
      enabled: true
      spec:
        port: "8427"
        replicaCount: 2
        topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: vmauth
        podDisruptionBudget:
          minAvailable: 1
        selectAllByDefault: true
        unauthorizedUserAccessSpec:
          disabled: true
        httpRoute:
          hostnames:
            - vmauth.${CLUSTER_APP_DOMAIN}
          parentRefs:
            - name: envoy
              namespace: envoy-system

    grafana:
      enabled: false
      forceDeployDatasource: true

    defaultDashboards:
      grafanaOperator:
        enabled: true
        spec:
          instanceSelector:
            matchLabels:
              dashboards: grafana
          allowCrossNamespaceImport: true

    defaultDatasources:
      grafanaOperator:
        enabled: true
        spec:
          instanceSelector:
            matchLabels:
              dashboards: grafana
          allowCrossNamespaceImport: true

    kubeControllerManager:
      service:
        selector:
          component: kube-apiserver
      vmScrape:
        spec:
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: http-metrics
              scheme: https
              tlsConfig:
                insecureSkipVerify: true

    kubeScheduler:
      service:
        selector:
          component: kube-apiserver
      vmScrape:
        spec:
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: http-metrics
              scheme: https
              tlsConfig:
                insecureSkipVerify: true

    kubeEtcd:
      service:
        selector:
          component: kube-apiserver
        port: 2381
        targetPort: 2381
      vmScrape:
        spec:
          endpoints:
            - scheme: http

    kubeProxy:
      enabled: true
