---
# Cloudflare DNS-01 issuer for *.o11y.futo.network (futo.network is on Cloudflare).
# cert-manager has native Cloudflare support — no webhook needed (unlike the OVH issuer
# `letsencrypt-production` that the cert-manager-webhook-ovh chart creates for
# futostatus.com). Token from the cloudflare-api-token Secret (externalsecret.yaml, shared_tf).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-cloudflare
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: acme@futo.org
    privateKeySecretRef:
      name: letsencrypt-cloudflare-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
