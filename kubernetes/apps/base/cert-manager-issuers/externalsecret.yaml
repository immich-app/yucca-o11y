---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
# futo.network DNS-edit token from shared_tf; feeds the letsencrypt-cloudflare DNS-01 solver.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-shared
  target:
    name: cloudflare-api-token
  data:
    - secretKey: api-token
      remoteRef:
        key: FUTO_NETWORK_DNS_CLOUDFLARE_API_TOKEN
