---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
# futo.network DNS-edit token (Zone:Read + DNS:Write, scoped to futo.network) from the
# shared_tf vault (immich-app/devtools). Feeds the letsencrypt-cloudflare DNS-01 solver.
# Same onepassword-shared store grafana-oauth reads.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-shared
  target:
    name: cloudflare-api-token
  data:
    - secretKey: api-token
      remoteRef:
        key: FUTO_NETWORK_DNS_CLOUDFLARE_API_TOKEN
