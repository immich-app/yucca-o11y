---
# In-cluster NetBird routing peer: routes mesh peers to the Envoy gateway VIP and serves
# NetBird DNS to the cluster (CoreDNS forwards futo.network to the netbird-dns Service).
# NET_ADMIN + userspace WireGuard — no tun/privileged.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbird-router
  labels:
    app.kubernetes.io/name: netbird-router
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: netbird-router
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netbird-router
    spec:
      # Public upstreams: NetBird forwards non-mesh names to the pod's original resolvers —
      # with cluster DNS, undistributed futo.network names would loop back through CoreDNS.
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 1.1.1.1
          - 9.9.9.9
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: netbird-router
      containers:
        - name: netbird
          # renovate: datasource=docker depName=netbirdio/netbird
          image: netbirdio/netbird:0.74.6@sha256:55a93ee3d2cad5d1a025a08316243fc758c938e150073dd39c747baec8778153
          env:
            - name: NB_SETUP_KEY
              valueFrom:
                secretKeyRef:
                  name: netbird-setup-key
                  key: setupKey
            - name: NB_MANAGEMENT_URL
              value: https://api.netbird.io
            # Bind pod-wide (default is the dynamic NetBird IP) so the Service can front it.
            - name: NB_DNS_RESOLVER_ADDRESS
              value: 0.0.0.0:53
          ports:
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
          startupProbe:
            exec:
              command: [netbird, status, --check, startup]
            periodSeconds: 3
            failureThreshold: 20
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: [netbird, status, --check, ready]
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: [netbird, status, --check, live]
            periodSeconds: 10
            failureThreshold: 6
            timeoutSeconds: 5
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
