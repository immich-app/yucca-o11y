---
# In-cluster NetBird routing peer: enrols via the netbird-setup-key Secret (from
# kubernetes/helm) and routes peers to the Envoy gateway VIP. 2 replicas for HA.
# NET_ADMIN + userspace WireGuard — no tun/privileged.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbird-router
  labels:
    app.kubernetes.io/name: netbird-router
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: netbird-router
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netbird-router
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: netbird-router
      containers:
        - name: netbird
          # renovate: datasource=docker depName=netbirdio/netbird
          image: netbirdio/netbird:0.73.2
          env:
            - name: NB_SETUP_KEY
              valueFrom:
                secretKeyRef:
                  name: netbird-setup-key
                  key: setupKey
            - name: NB_MANAGEMENT_URL
              value: https://api.netbird.io
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
