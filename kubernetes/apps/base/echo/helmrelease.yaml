---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: echo
spec:
  chartRef:
    kind: OCIRepository
    name: echo
  interval: 1h
  rollback:
    cleanupOnFail: true
  upgrade:
    cleanupOnFail: true
    strategy:
      name: RemediateOnFailure
    remediation:
      remediateLastFailure: true
      retries: 2
  values:
    replicaCount: 3
    config:
      kubernetes: true
      trustedProxies:
        - 10.244.0.0/16
    httpRoute:
      enabled: true
      hostnames:
        - echo.${APP_DOMAIN}
      parentRefs:
        - name: envoy
          namespace: envoy-system
    monitoring:
      serviceMonitor:
        enabled: true
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: echo
            app.kubernetes.io/instance: echo
    resources:
      requests:
        cpu: 10m
      limits:
        memory: 64Mi
