---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-logs
  interval: 1h
  rollback:
    cleanupOnFail: true
  upgrade:
    cleanupOnFail: true
    strategy:
      name: RemediateOnFailure
    remediation:
      remediateLastFailure: true
      retries: 2
  values:
    fullnameOverride: victoria-logs

    vlstorage:
      replicaCount: 3
      resources:
        requests:
          cpu: 200m
          memory: 1Gi
        limits:
          memory: 12Gi
      retentionPeriod: ${CLUSTER_VMLOGS_RETENTION}
      persistentVolume:
        storageClassName: ${CLUSTER_VMLOGS_STORAGE_CLASS}
        size: 100Gi
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: vlstorage
      vmServiceScrape:
        enabled: true

    vlinsert:
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 6Gi
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: vlinsert
      vmServiceScrape:
        enabled: true

    vlselect:
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 6Gi
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: vlselect
      vmServiceScrape:
        enabled: true
