---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics-operator
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-metrics-operator
  install:
    crds: CreateReplace
  interval: 1h
  rollback:
    cleanupOnFail: true
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    strategy:
      name: RemediateOnFailure
    remediation:
      remediateLastFailure: true
      retries: 2
  values:
    admissionWebhooks:
      enabled: true
      certManager:
        enabled: true

    operator:
      prometheus_converter:
        enabled: true

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
