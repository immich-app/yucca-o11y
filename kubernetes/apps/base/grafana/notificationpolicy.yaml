---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafananotificationpolicy_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaNotificationPolicy
metadata:
  name: notification-policy
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  route:
    receiver: discord
    group_by:
      - grafana_folder
      - alertname
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: discord
        object_matchers:
          - ["project", "=", "yucca"]
      - receiver: discord
        object_matchers:
          - ["project", "=", "o11y"]
