# Official Envoy Gateway dashboards from grafana.com, fetched by the operator and
# bound to our Prometheus-compatible VictoriaMetrics datasource. Pair with the
# envoy PodMonitor/ServiceMonitor in base/envoy-gateway/o11y.yaml.
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: envoy-overview
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  resyncPeriod: 10m
  datasources:
    - datasourceName: VictoriaMetrics
      inputName: DS_PROMETHEUS
  url: https://grafana.com/api/dashboards/24459/revisions/3/download
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: envoy-upstream
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  resyncPeriod: 10m
  datasources:
    - datasourceName: VictoriaMetrics
      inputName: DS_PROMETHEUS
  url: https://grafana.com/api/dashboards/24457/revisions/4/download
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: envoy-downstream
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  resyncPeriod: 10m
  datasources:
    - datasourceName: VictoriaMetrics
      inputName: DS_PROMETHEUS
  url: https://grafana.com/api/dashboards/24458/revisions/3/download
