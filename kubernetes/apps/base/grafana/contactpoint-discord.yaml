---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanacontactpoint_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaContactPoint
metadata:
  name: discord
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  name: discord
  receivers:
    - type: discord
      settings:
        title: |-
          {{ if .Alerts.Firing }}🔴 {{ .Alerts.Firing | len }} firing{{ else }}✅ resolved{{ end }} · {{ .CommonLabels.grafana_folder }}{{ if .CommonLabels.cluster }} · {{ .CommonLabels.cluster }}{{ end }}
        message: |-
          {{ range .Alerts -}}
          **{{ .Labels.alertname }}**  `{{ .Labels.severity }}`
          {{ if .Annotations.summary }}> {{ .Annotations.summary }}{{ if match "67" .Annotations.summary }} <a:pepe67:1500112466921652265>{{ end }}
          {{ end }}[View rule]({{ .GeneratorURL }}){{ if .SilenceURL }}  ·  [Silence]({{ .SilenceURL }}){{ end }}

          {{ end -}}
      valuesFrom:
        - targetPath: url
          valueFrom:
            secretKeyRef:
              name: grafana-discord-webhook
              key: url
