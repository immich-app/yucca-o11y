---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-password
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-environment
  target:
    name: grafana-admin-password
    template:
      data:
        GF_SECURITY_ADMIN_PASSWORD: "{{ .password }}"
  dataFrom:
    - extract:
        key: GRAFANA_ADMIN_PASSWORD
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
# Shared across all Grafana replicas: signs/encrypts data-source secrets in the DB
# (AES-256). Must be identical on every replica so any replica can decrypt what
# another wrote; a strong value here replaces Grafana's insecure built-in default.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-secret-key
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-environment
  target:
    name: grafana-secret-key
    template:
      data:
        GF_SECURITY_SECRET_KEY: "{{ .password }}"
  dataFrom:
    - extract:
        key: GRAFANA_SECRET_KEY
