---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-password
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: grafana-admin-password
    template:
      data:
        GRAFANA_ADMIN_PASSWORD: "{{ .password }}"
  dataFrom:
    - extract:
        key: GRAFANA_ADMIN_PASSWORD
