---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs-collector
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-logs-collector
  interval: 1h
  rollback:
    cleanupOnFail: true
  upgrade:
    cleanupOnFail: true
    strategy:
      name: RemediateOnFailure
    remediation:
      remediateLastFailure: true
      retries: 2
  values:
    fullnameOverride: victoria-logs-collector

    remoteWrite:
      - url: http://victoria-logs-vlinsert.o11y.svc.cluster.local:9481/insert/native
        maxDiskUsagePerURL: 10GB

    extraArgs:
      "kubernetesCollector.decolorizeFields": _msg

    collector:
      extraFields: '{"cluster":"${CLUSTER_NAME}"}'
      streamFields:
        - kubernetes.pod_name
        - kubernetes.pod_namespace
        - kubernetes.container_name
        - kubernetes.pod_labels.app.kubernetes.io/name

    podMonitor:
      enabled: true

    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
