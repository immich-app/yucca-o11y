---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-webhook-ovh
  namespace: flux-system
spec:
  dependsOn:
    - name: cert-manager
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: cert-manager-webhook-ovh
      namespace: cert-manager
  interval: 1h
  path: ./kubernetes/apps/base/cert-manager-webhook-ovh
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: cert-manager
  patches:
    - patch: |-
        apiVersion: source.toolkit.fluxcd.io/v1
        kind: OCIRepository
        metadata:
          name: cert-manager-webhook-ovh
        spec:
          ref:
            # renovate: datasource=docker depName=ghcr.io/aureq/charts/cert-manager-webhook-ovh
            tag: 0.9.13
            digest: sha256:af2391900ae7859e7514ab962d6e5dac8f0f7ea479fb032251caba81b903177e
      target:
        kind: OCIRepository
        name: cert-manager-webhook-ovh
