---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: netbird-router
  namespace: flux-system
spec:
  interval: 1h
  path: ./kubernetes/apps/base/netbird-router
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: netbird
  patches:
    - patch: |-
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: netbird-router
        spec:
          template:
            spec:
              containers:
                - name: netbird
                  # renovate: datasource=docker depName=netbirdio/netbird
                  image: netbirdio/netbird:0.73.2@sha256:201ce4bfa4f72c458db8a75db2dbb6929bed3a16f5150ce44f9ef3a49998a3fb
      target:
        kind: Deployment
        name: netbird-router
