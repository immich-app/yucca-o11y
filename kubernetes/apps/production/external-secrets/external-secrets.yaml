---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets
  namespace: flux-system
spec:
  dependsOn:
    - name: prometheus-operator-crds
    # The controller pod's netbird-egress annotation needs the NAD to exist to schedule.
    - name: multus-networks
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: external-secrets
      namespace: external-secrets
  interval: 1h
  path: ./kubernetes/apps/base/external-secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: external-secrets
  patches:
    - patch: |-
        apiVersion: source.toolkit.fluxcd.io/v1
        kind: OCIRepository
        metadata:
          name: external-secrets
        spec:
          ref:
            # renovate: datasource=docker depName=ghcr.io/external-secrets/charts/external-secrets
            tag: 2.2.0
            digest: sha256:feb252e996e2ce31ea015a1e098f2c5d438389a0a2fc1f43659b3f5421046f6f
      target:
        kind: OCIRepository
        name: external-secrets
