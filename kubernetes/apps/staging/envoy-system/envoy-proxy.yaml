---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-proxy
  namespace: flux-system
spec:
  dependsOn:
    - name: envoy-gateway
    # Envoy's Service is type: LoadBalancer; without the pool configured
    # it would sit Pending forever waiting for an LB IP.
    - name: metallb-config
  interval: 1h
  path: ./kubernetes/apps/base/envoy-proxy
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: envoy-system
  wait: true
