---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prometheus-operator-crds
  namespace: flux-system
spec:
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: prometheus-operator-crds
      namespace: o11y
  interval: 1h
  path: ./kubernetes/apps/base/prometheus-operator-crds
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: o11y
  patches:
    - patch: |-
        apiVersion: source.toolkit.fluxcd.io/v1
        kind: OCIRepository
        metadata:
          name: prometheus-operator-crds
        spec:
          ref:
            # renovate: datasource=docker depName=ghcr.io/prometheus-community/charts/prometheus-operator-crds
            tag: 27.0.0
      target:
        kind: OCIRepository
        name: prometheus-operator-crds
