---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana
  namespace: flux-system
spec:
  dependsOn:
    - name: prometheus-operator-crds
    - name: grafana-operator
    - name: external-secrets
  interval: 1h
  path: ./kubernetes/apps/base/grafana
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: o11y
  patches:
    - patch: |-
        apiVersion: grafana.integreatly.org/v1beta1
        kind: Grafana
        metadata:
          name: grafana
        spec:
          httpRoute:
            spec:
              hostnames:
                - grafana.staging.futostat.us
                - grafana.staging.futostatus.com
      target:
        kind: Grafana
        name: grafana
