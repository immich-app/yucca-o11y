---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-operator
  namespace: flux-system
spec:
  dependsOn:
    - name: prometheus-operator-crds
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: grafana-operator
      namespace: o11y
  interval: 1h
  path: ./kubernetes/apps/base/grafana-operator
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: o11y
  patches:
    - patch: |-
        apiVersion: source.toolkit.fluxcd.io/v1
        kind: OCIRepository
        metadata:
          name: grafana-operator
        spec:
          ref:
            # renovate: datasource=docker depName=ghcr.io/grafana/helm-charts/grafana-operator
            tag: 5.22.2
      target:
        kind: OCIRepository
        name: grafana-operator
