---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: victoria-metrics-operator-crds
  namespace: flux-system
spec:
  dependsOn:
    - name: prometheus-operator-crds
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: victoria-metrics-operator-crds
      namespace: o11y
  interval: 1h
  path: ./kubernetes/apps/base/victoria-metrics-operator-crds
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: o11y
  patches:
    - patch: |-
        apiVersion: source.toolkit.fluxcd.io/v1
        kind: OCIRepository
        metadata:
          name: victoria-metrics-operator-crds
        spec:
          ref:
            # renovate: datasource=docker depName=ghcr.io/victoriametrics/helm-charts/victoria-metrics-operator-crds
            tag: 0.6.1
      target:
        kind: OCIRepository
        name: victoria-metrics-operator-crds
