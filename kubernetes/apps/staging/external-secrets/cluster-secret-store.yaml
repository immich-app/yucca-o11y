---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-secret-store
  namespace: flux-system
spec:
  dependsOn:
    - name: external-secrets
    - name: onepassword-connect
  interval: 1h
  path: ./kubernetes/apps/base/cluster-secret-store
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: external-secrets
  wait: true
  patches:
    - patch: |-
        apiVersion: external-secrets.io/v1
        kind: ClusterSecretStore
        metadata:
          name: onepassword-environment
        spec:
          provider:
            onepassword:
              vaults:
                o11y_tf_staging: 1
      target:
        kind: ClusterSecretStore
        name: onepassword-environment
