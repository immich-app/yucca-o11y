---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: onepassword-connect
  namespace: flux-system
spec:
  dependsOn:
    - name: prometheus-operator-crds
    - name: external-secrets
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: onepassword-connect
      namespace: external-secrets
  interval: 1h
  path: ./kubernetes/apps/base/onepassword-connect
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: external-secrets
  patches:
    - patch: |-
        apiVersion: source.toolkit.fluxcd.io/v1
        kind: OCIRepository
        metadata:
          name: onepassword-connect
        spec:
          ref:
            # renovate: datasource=docker depName=ghcr.io/1password/connect
            tag: 2.4.1
      target:
        kind: OCIRepository
        name: onepassword-connect
