---
# Installs the chart + its CRDs. The IPAddressPool / L2Advertisement CRs
# live in a separate Kustomization (metallb-config.yaml) that depends on
# this one — `wait: true` here ensures the CRDs are registered before
# the dependent reconcile attempts to apply CRs against them.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metallb
  namespace: flux-system
spec:
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: metallb
      namespace: metallb-system
  interval: 1h
  path: ./kubernetes/apps/base/metallb
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: metallb-system
  wait: true
  patches:
    - patch: |-
        apiVersion: source.toolkit.fluxcd.io/v1
        kind: OCIRepository
        metadata:
          name: metallb
        spec:
          ref:
            # renovate: datasource=docker depName=quay.io/metallb/chart/metallb
            tag: "0.16.0"
      target:
        kind: OCIRepository
        name: metallb
