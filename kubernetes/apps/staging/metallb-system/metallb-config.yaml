---
# IPAddressPool + L2Advertisement; depends on the chart Kustomization so
# the CRDs exist before these CRs apply. `${ENVOY_IP}` is substituted from
# the metallb-pool ConfigMap (terraform: kubernetes/helm/resources.tf).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metallb-config
  namespace: flux-system
spec:
  dependsOn:
    - name: metallb
  interval: 1h
  path: ./kubernetes/apps/base/metallb-config
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: metallb-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: metallb-pool
