---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openebs
  namespace: flux-system
spec:
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: openebs
      namespace: openebs-system
  interval: 1h
  path: ./kubernetes/apps/base/openebs
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: openebs-system
  patches:
    - patch: |-
        apiVersion: source.toolkit.fluxcd.io/v1
        kind: OCIRepository
        metadata:
          name: openebs
        spec:
          ref:
            # renovate: datasource=docker depName=ghcr.io/openebs/charts/openebs
            tag: 4.4.0
      target:
        kind: OCIRepository
        name: openebs
