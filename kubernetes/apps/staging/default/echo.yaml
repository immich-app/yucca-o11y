---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: echo
  namespace: flux-system
spec:
  dependsOn:
    - name: envoy-proxy
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: echo
      namespace: default
  interval: 1h
  path: ./kubernetes/apps/base/echo
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: default
  patches:
    - patch: |-
        apiVersion: source.toolkit.fluxcd.io/v1
        kind: OCIRepository
        metadata:
          name: echo
        spec:
          ref:
            # renovate: datasource=docker depName=ghcr.io/bjw-s-labs/helm/app-template
            tag: 4.6.2
      target:
        kind: OCIRepository
        name: echo
    - patch: |-
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: echo
        spec:
          values:
            route:
              app:
                hostnames:
                  - echo.staging.futostat.us
                  - echo.staging.futostatus.com
      target:
        kind: HelmRelease
        name: echo
