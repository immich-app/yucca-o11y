---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMSingle
metadata:
  name: vmsingle
  namespace: o11y
spec:
  replicaCount: 1
  retentionPeriod: "60d"

  storage:
    storageClassName: openebs-hostpath
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 300Gi

  resources:
    requests:
      cpu: 1000m
      memory: 4Gi
    limits:
      cpu: 4000m
      memory: 16Gi

  serviceSpec:
    type: ClusterIP
    spec:
      ports:
        - name: http
          port: 8428
          targetPort: 8428

  extraArgs:
    dedup.minScrapeInterval: "30s"
    search.maxQueryDuration: "5m"
    search.maxConcurrentRequests: "16"
    memory.allowedPercent: "60"
