apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: victoria-logs-collector
  namespace: flux-system
spec:
  targetNamespace: o11y
  dependsOn:
    - name: victoria-logs
  interval: 1h
  path: ./kubernetes/apps/victoria-logs-collector/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
