apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: victoria-metrics
  namespace: flux-system
spec:
  targetNamespace: o11y
  dependsOn:
    - name: grafana-operator
  interval: 1h
  path: ./kubernetes/apps/victoria-metrics/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
